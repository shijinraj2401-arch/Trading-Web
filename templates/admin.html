<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <style>
        body { background: #090d16; color: white; padding: 20px; font-family: sans-serif; display: flex; justify-content: center; }
        .container { width: 450px; background: #0d1220; padding: 25px; border-radius: 15px; border: 2px solid #1e2640; }
        h2, h3 { color: #ff6b00; margin-top: 0; }
        .form-group { margin-bottom: 12px; }
        input { width: 100%; padding: 10px; background: #141c30; border: 1px solid #253354; color: white; border-radius: 6px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; background: #ff6b00; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 6px; margin-top: 10px; }
        ul { list-style: none; padding: 0; margin-top: 15px; }
        li { background: #111827; padding: 10px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #1f2937; display: flex; justify-content: space-between; font-size: 14px; }
        .logout-btn { color: #ff1744; text-decoration: none; font-size: 14px; float: right; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/logout" class="logout-btn">LOGOUT</a>
        <h2>User Control Panel</h2>
        <form action="/admin/add_user" method="POST">
            <div class="form-group"><input type="text" name="username" placeholder="Username" required></div>
            <div class="form-group"><input type="text" name="password" placeholder="Password" required></div>
            <div class="form-group"><input type="date" name="expiry" required></div>
            <button type="submit">ADD / UPDATE USER</button>
        </form>
        <hr style="border: 1px dashed #253354; margin: 20px 0;">
        <h3>Premium Active Users</h3>
        <ul>
            {% for user, data in users.items() %}
            <li>
                <span>👤 <strong>{{ user }}</strong></span>
                <span style="color: #ffd600;">📅 {{ data.expiry }}</span>
            </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
